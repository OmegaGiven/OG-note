name: Build native apps

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/note/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/note
          args: ${{ matrix.args }}
          tagName: og-note-v__VERSION__
          releaseName: 'OG Note v__VERSION__'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/note/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        working-directory: apps/note
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: og-note-android
          path: apps/note/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # iOS builds need an Apple Developer signing certificate + provisioning
  # profile as repo secrets (APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
  # APPLE_PROVISIONING_PROFILE, APPLE_TEAM_ID) before this can produce a
  # signed .ipa. Left as manual-trigger-only until those are set up so it
  # doesn't fail every push in the meantime.
  ios:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/note/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build iOS (unsigned)
        working-directory: apps/note
        run: npx tauri ios build --ci
