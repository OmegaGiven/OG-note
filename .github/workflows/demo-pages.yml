name: Deploy og-note demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/note/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/demo-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build local-only demo bundle
        run: npm run build --workspace @og-note/app
        env:
          OG_NOTES_BASE: /OG-note/
          OG_NOTES_DEMO: '1'
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/note/dist
      - id: deployment
        uses: actions/deploy-pages@v4
